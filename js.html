<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    // Write a function called add7 that takes one number and returns that number + 7. add7(10) should return 17 //

    function add7(a) {
        return a + 7;
    };
    console.log(add7(10));

    //Write a function called multiply that takes 2 numbers and returns their product. multiply(3, 2) should return 6//

    function multiply(a, b) {
        return a * b;
    };
    console.log(multiply(3,2));

    //Write a function called capitalize that takes a string and returns that string with only the first letter capitalized. Make sure that it can take strings that are lowercase, UPPERCASE or BoTh.//
    //capitalize("abcd") should return "Abcd"//
    //capitalize("ABCD") should return "Abcd"//
    //capitalize("aBcD") should return "Abcd"//

    function capitalize(word) {
        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
    };

    //Write a function called lastLetter that takes a string and returns the very last letter of that string: lastLetter("abcd") should return "d"//

    function lastLetter(word) {
        return word.charAt(word.length - 1);
    };

    //FizzBuzz with a for loop://

    let answer = parseInt(prompt("Please enter the number you would like to FizzBuzz up to:"))

    for (let = i = 1; i <= answer; i++) {
        if (i % 3 === 0 && i % 5 === 0) {
            console.log("FizzBuzz");
        } else if (i % 3 === 0) {
            console.log("Fizz")
        } else if (i % 5 === 0) {
            console.log("Buzz")
        } else {
            console.log(i)
        }
    }
    </script>
</body>
</html>
